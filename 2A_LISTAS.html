<!DOCTYPE html>
 <html>
  <head>
   <charset="UTF-8">
   <title> Ordered (OL) & Unordered (UL) Lists </title>
  </head>
  <body>
   <div>
   <h1> Ordered lists </h1>
   <h2> My Subjects </h2>
   </div>
   <ol>
    <li> Ciencias Naturales </li>
    <li> Ciencias Sociales </li>
    <li> Cultura Digital </li>
    <li> Matematicas </li>
    <li> Lengua y Comunicacion </li>
    <li> Ciencias y Tecnologia </li>
   </ol>
  <p> <h2> Things to do in the morning </h2> </p>
   <ul>
    <li> Wake up  </li>
    <li> Put On My Uniform </li>
    <li> Have Breakfast </li>
   </ul>
  </body>
 </html>
