<!DOCTYPE html>
 <html>
  <head>
   <meta charset="UTF-8">
   <title> Marquee's </title>

   <style>
    body {background-color:skyblue}
    .page {background-color:lightblue; border-radius: 20px; border: 2px solid white; width: 500px;} 
   </style>

  </head>
  <body>
   <center>

    <div class="page">
     <h1 style="background-color:white; border-radius: 10px; width: 450px;"> Marquee's </h1>

     <h2> Horizontal Marquee </h2>
     <marquee> Marquee </marquee>

     <h2> Horizontal Right Marquee </h1>
     <marquee direction="right"> Marquee </marquee>

     <h2> Vertical Up Marquee </h2>
     <marquee direction="up" style="width: 60px;"> Marquee </marquee>

     <h2> Vertical Down Marquee </h2>
     <marquee direction="down" style="width: 60px;"> Marquee </marquee>

     <h2> Slow Marquee </h2>
     <marquee scrollamount="4"> Marquee </marquee>

     <h2> Fast Marquee </h2>
     <marquee scrollamount="10"> Marquee </marquee>

     <h2> Bounce Marquee </h2>
     <marquee behavior="alternate" scrollamount="20"> Marquee </marquee>

     <h2> Image Marquee </h2>
     <marquee scrollamount="5">
      <h4> Blue ball <h4>
     </marquee>
     <marquee scrollamount="6.8">
      <img src="https://static.vecteezy.com/system/resources/previews/060/364/514/non_2x/shiny-blue-ball-isolated-on-transparent-background-free-png.png" width="200">
     </marquee>

     <h2> Link Marquee </h2>
     <marquee> <h3> <a href="https://youtube.com"> Youtube </a> </h3> </marquee>

     <h2> Video Marquee </h2>
     <marquee behaviour="alternate"> <iframe width="320" height="180" src="https://www.youtube.com/embed/WIRK_pGdIdA?si=1-MMOPQ09eL26NC4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> </marquee>
    </div>

    <h2> <a href="index.html" style="width: 300px; background-color:lightblue; border-radius: 20px; border: 2px solid white;"> Go Back? </a> </h2>

   </center>
  </body>
 </html>
