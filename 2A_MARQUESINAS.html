<!DOCTYPE html>
 <html>
  <head>
   <meta charset="UTF-8">
   <title> Marquee's </title>

   <style>
    body {background-color:skyblue}
    .page {background-color:lightblue; border-radius: 20px; border: 2px solid white; width: 500px;}
    .left {border-bottom: 2px dashed white; border-top: 2px dashed white; width:450px;}
    .right {border-bottom: 2px dashed white; width:450px;}
    .up {border-bottom: 2px dashed white; width:450px;}
    .down {border-bottom: 2px dashed white; width:450px;}
    .slow {border-bottom: 2px dashed white; width:450px;}
    .fast {border-bottom: 2px dashed white; width:450px;}
    .bounce {border-bottom: 2px dashed white; width:450px;}
    .image {border-bottom: 2px dashed white; width:450px;}
    .link {border-bottom: 2px dashed white; width:450px;}
   </style>

  </head>
  <body>
   <center>

    <div class="page">
     <h1 style="background-color:white; border-radius: 10px; width: 450px;"> Marquee's </h1>

     <div class="left">
      <h2> Horizontal Marquee </h2>
      <marquee> Marquee </marquee>
     </div>

     <div class="right">
      <h2> Horizontal Right Marquee </h1>
      <marquee direction="right"> Marquee </marquee>
     </div>

     <div class="up">
      <h2> Vertical Up Marquee </h2>
      <marquee direction="up" style="width: 60px;"> Marquee </marquee>
     </div>

     <div class="down">
      <h2> Vertical Down Marquee </h2>
      <marquee direction="down" style="width: 60px;"> Marquee </marquee>
     </div>

     <div class="slow">
      <h2> Slow Marquee </h2>
      <marquee scrollamount="4"> Marquee </marquee>
     </div>

     <div class="fast">
      <h2> Fast Marquee </h2>
      <marquee scrollamount="10"> Marquee </marquee>
     </div>

     <div class="bounce">
      <h2> Bounce Marquee </h2>
      <marquee behavior="alternate" scrollamount="20"> Marquee </marquee>
     </div>

     <div class="image">
      <h2> Image Marquee </h2>
      <marquee scrollamount="5">
       <h4> Blue ball </h4>
      </marquee>
      <marquee scrollamount="6.8">
       <img src="images/Blue_ball.png" width="200">
      </marquee>
     </div>

     <div class="link">
      <h2> Link Marquee </h2>
      <marquee> <h3> <a href="https://youtube.com"> Youtube </a> </h3> </marquee>
     </div>

      <h2> Video Marquee </h2>
      <marquee behavior="alternate"> <iframe width="320" height="180" src="https://www.youtube.com/embed/WIRK_pGdIdA?si=1-MMOPQ09eL26NC4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> </marquee>
    </div>

    <h2> <a href="index.html" style="width: 300px; background-color:lightblue; border-radius: 20px; border: 2px solid white;"> Go Back? </a> </h2>

   </center>
  </body>
 </html>
